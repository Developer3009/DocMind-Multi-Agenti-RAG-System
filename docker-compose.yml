version: '3.8'

services:
  web-app:
    build: .
    ports:
      - "8501:8501" 
    environment:
      # Tells your Python app to route requests to the Ollama container
      - OLLAMA_BASE_URL=http://ollama-service:11434 
    depends_on:
      - ollama-service

  ollama-service:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      # Saves your downloaded models so they don't disappear when restarted
      - ollama_data:/root/.ollama

volumes:
  ollama_data: